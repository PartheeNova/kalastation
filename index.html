<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rice GI Standalone Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --bg-color: #f4f7f9; --card-bg: #ffffff; --text-main: #2d3436; --text-muted: #6c757d; --border-color: rgba(0,0,0,0.1); }
    body { background: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; }
    .kpi-card { border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); height: 100%; padding: 15px; }
    .ribbon-card { border-left: 5px solid #1a73e8; }
    .chart-box { position: relative; height: 220px; width: 100%; }
    #map { height: 350px; border-radius: 12px; width: 100%; margin-top: 20px; border: 1px solid var(--border-color); }
    #debug-console { background: #1e1e1e; color: #00ff00; font-family: monospace; font-size: 11px; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 150px; overflow-y: auto; border: 2px solid #333; }
    .no-print { margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container-fluid py-3 px-lg-4">
  <header class="no-print d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
    <div>
      <h5 class="m-0 fw-bold">Rice GI Dashboard <span id="sync-dot" class="badge rounded-pill bg-danger">●</span></h5>
      <small id="last-update" class="text-muted">Initializing Data...</small>
    </div>
    
    <div class="d-flex gap-2">
      <select id="stationSelect" class="form-select form-select-sm" style="width: 200px;" onchange="updateDashboard()">
        <option value="Station1">📍 WS1-Center</option>
        <option value="Station2">📍 WS2-ลุงสัมฤทธิ์</option>
        <option value="Station3">📍 WS3-แม่หนูพร</option>
        <option value="Station4">📍 WS4-นาลุงทอง</option>
        <option value="Station5">📍 WS5-นาลุงบุญเรือง</option>
      </select>

      <select id="rangeSelect" class="form-select form-select-sm" style="width: 110px;" onchange="updateDashboard()">
        <option value="1">Last 24h</option>
        <option value="7" selected>Last 7d</option>
        <option value="30">Last 30d</option>
      </select>
    </div>
  </header>

  <div id="pdf-area">
    <div class="row g-3 mb-3 text-center">
      <div class="col-md-2 col-4"><div class="card kpi-card ribbon-card"><span>Air Temp</span><h4 id="ribbon-at">--</h4></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card ribbon-card" style="border-color:#3498db"><span>Air Hum</span><h4 id="ribbon-ah">--</h4></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card ribbon-card" style="border-color:#f39c12"><span>Soil Temp</span><h4 id="ribbon-st">--</h4></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card ribbon-card" style="border-color:#16a085"><span>Soil Hum</span><h4 id="ribbon-sh">--</h4></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card ribbon-card" style="border-color:#2ecc71"><span>Rain Tot</span><h4 id="ribbon-rt">--</h4></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card ribbon-card" style="border-color:#9b59b6"><span>Lux</span><h4 id="ribbon-lx">--</h4></div></div>
    </div>

    <div class="row g-3">
      <div class="col-md-6"><div class="card kpi-card"><h6>Atmospheric Trends</h6><div class="chart-box"><canvas id="atmoChart"></canvas></div></div></div>
      <div class="col-md-6"><div class="card kpi-card"><h6>Soil Environment</h6><div class="chart-box"><canvas id="soilChart"></canvas></div></div></div>
    </div>
  </div>

  <div id="map"></div>
  
  <div id="debug-console">
    <strong>[System Log]</strong><br>
    Dashboard initialized. Fetching Google Sheet data...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
  // STEP 1: Insert your Google CSV URLs here
  const CSV_URLS = {
    "Station1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlF2XlxASp81OwalhHyDHIjuQrJlQ9aNX39rG-CfyPW70B8ZO5z7hbYSObqNnWvcQYGxnnFadAHlfA/pub?gid=0&single=true&output=csv",
    "Station2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCN67R_-V2iFOjw8sKyniqRNsCK_EuwPAAPQAVGkAqXq_HAZRdu0-gLcHCB1eE0iGTmudj73-HZoh1/pub?gid=0&single=true&output=csv",
    "Station3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIxdVPSzyELRwSONbkG_nlY7CZufgVTAX-wpbnKEa-qd5_d1E_vj_WCllqUbCJmrBmD-3536mN82td/pub?gid=0&single=true&output=csv",
    "Station4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vT4K5gX_cezEtXCF6wdDcZs158Kk76Yfc8nXAKPBxb_TbYcIaukoGeRt7RL28_uu_65N4Ij5CkhWo6Z/pub?gid=0&single=true&output=csv",
    "Station5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSu50u1uD8I3MoIr-JjRwBNoo93Dy5HwQqW76y4eG01_WfpmQZ9tlua2JPedkZnx-huno_zK7SQEmqJ/pub?gid=0&single=true&output=csv"
  };

  const LOCATIONS = {
    "Station1": { lat: 16.585336, lng: 104.129084, name: "WS1-Center" },
    "Station2": { lat: 16.562694, lng: 104.099798, name: "WS2-ลุงสัมฤทธิ์"},
    "Station3": { lat: 16.591757, lng: 104.136539, name: "WS3-แม่หนูพร"},
    "Station4": { lat: 16.597545, lng: 104.152571, name: "WS4-นาลุงทอง"},
    "Station5": { lat: 16.580340, lng: 104.139379, name: "WS5-นาลุงบุญเรือง"}
  };

  let charts = {}, map, globalHistory = [];

  function log(msg) {
    const con = document.getElementById('debug-console');
    con.innerHTML += `<br>> ${msg}`;
    con.scrollTop = con.scrollHeight;
  }

  function initMap() {
    map = L.map('map').setView([16.58, 104.12], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    Object.keys(LOCATIONS).forEach(key => {
      const loc = LOCATIONS[key];
      L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(loc.name);
    });
  }

  function updateDashboard() {
    const station = document.getElementById('stationSelect').value;
    const url = CSV_URLS[station];
    const days = Number(document.getElementById('rangeSelect').value);
    
    log(`Connecting to ${station}...`);
    document.getElementById('sync-dot').className = 'badge rounded-pill bg-warning';

    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        log(`Data fetched. Rows: ${results.data.length}`);
        if(results.data.length > 0) {
          processCSVData(results.data, days, station);
        } else {
          log("ERROR: CSV is empty. Check Google Sheet publishing.");
        }
      },
      error: function(err) {
        log(`CRITICAL ERROR: ${err}`);
      }
    });
  }

  function processCSVData(rawData, days, stationKey) {
    // Determine header names automatically (case-insensitive)
    const firstRow = rawData[0];
    const getCol = (possibleNames) => {
        return Object.keys(firstRow).find(key => 
            possibleNames.includes(key.toLowerCase().trim())
        );
    };

    const keys = {
        ts: getCol(['timestamp', 'time', 'date']),
        temp: getCol(['temp', 'airtemp', 'temperature']),
        hum: getCol(['hum', 'humidity', 'airhum']),
        soilH: getCol(['soilhum', 'soilh', 'soil humidity']),
        soilT: getCol(['soiltemp', 'soilt', 'soil temperature']),
        rain: getCol(['raintot', 'rain', 'rainfall']),
        lux: getCol(['lux', 'light', 'intensity'])
    };

    log(`Detected Headers: ${Object.values(keys).filter(k => k).join(', ')}`);

    // Filter by time
    const cutoff = new Date(Date.now() - (days * 24 * 60 * 60 * 1000));
    const filtered = rawData.filter(row => new Date(row[keys.ts]) >= cutoff);

    if (filtered.length === 0) {
        log("ERROR: No rows match the date range.");
        return;
    }

    const latest = filtered[filtered.length - 1];
    globalHistory = filtered;

    // Update UI
    document.getElementById('ribbon-at').innerText = (latest[keys.temp] || "--") + "°";
    document.getElementById('ribbon-ah').innerText = (latest[keys.hum] || "--") + "%";
    document.getElementById('ribbon-st').innerText = (latest[keys.soilT] || "--") + "°";
    document.getElementById('ribbon-sh').innerText = (latest[keys.soilH] || "--") + "%";
    document.getElementById('ribbon-rt').innerText = (latest[keys.rain] || "0");
    document.getElementById('ribbon-lx').innerText = (latest[keys.lux] || "--");
    document.getElementById('last-update').innerText = "Last Update: " + latest[keys.ts];

    // Render Charts
    const labels = filtered.map(r => r[keys.ts]);
    renderLine('atmoChart', labels, [
        {label: 'Temp', data: filtered.map(r => r[keys.temp]), color: '#e74c3c'},
        {label: 'Hum', data: filtered.map(r => r[keys.hum]), color: '#3498db'}
    ]);
    renderLine('soilChart', labels, [
        {label: 'Soil T', data: filtered.map(r => r[keys.soilT]), color: '#f39c12'},
        {label: 'Soil H', data: filtered.map(r => r[keys.soilH]), color: '#16a085'}
    ]);

    map.panTo([LOCATIONS[stationKey].lat, LOCATIONS[stationKey].lng]);
    document.getElementById('sync-dot').className = 'badge rounded-pill bg-success';
    log("Dashboard Sync Successful.");
  }

  function renderLine(id, labels, datasets) {
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
      type: 'line',
      data: { 
        labels: labels, 
        datasets: datasets.map(d => ({ 
            label: d.label, 
            data: d.data, 
            borderColor: d.color, 
            tension: 0.3, 
            pointRadius: 0 
        })) 
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  window.onload = () => { initMap(); updateDashboard(); };
</script>
</body>
</html>
